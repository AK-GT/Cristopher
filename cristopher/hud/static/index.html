<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRISTOPHER · HUD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grid-bg"></div>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="hud">
    <!-- Barra superior: identidad · hora · estado -->
    <header class="topbar panel">
      <i class="bracket"></i>
      <div class="brand">
        <span class="dot"></span>
        <span class="name">CRISTOPHER</span>
        <span class="sub">Cognición · Razonamiento · Integración · Situacional</span>
      </div>
      <div class="clock" id="clock">--:--:--</div>
      <div class="status" id="status"><span class="stled"></span><span id="status-text">reposo</span></div>
    </header>

    <!-- Izquierda: métricas de sistema -->
    <aside class="left panel">
      <i class="bracket"></i>
      <div class="panel-title">SISTEMA</div>
      <div class="metric">
        <div class="metric-head"><span>CPU</span><span id="cpu-val">0%</span></div>
        <div class="bar"><i id="cpu-bar"></i></div>
      </div>
      <div class="metric">
        <div class="metric-head"><span>RAM</span><span id="ram-val">0%</span></div>
        <div class="bar"><i id="ram-bar"></i></div>
      </div>
      <div class="panel-title" style="margin-top:22px">NÚCLEO</div>
      <div class="corestat"><span>estado</span><b id="core-state">reposo</b></div>
      <div class="corestat"><span>latido</span><b id="core-beat">·</b></div>
    </aside>

    <!-- Centro: núcleo de partículas -->
    <main class="core panel">
      <i class="bracket"></i>
      <canvas id="core-canvas"></canvas>
      <div class="core-caption" id="core-caption">presencia en reposo</div>
    </main>

    <!-- Derecha: tarea activa · sub-agentes · alertas -->
    <aside class="right panel">
      <i class="bracket"></i>
      <div class="panel-title">TAREA ACTIVA</div>
      <div class="task" id="task">—</div>
      <div class="panel-title" style="margin-top:18px">SUB-AGENTES</div>
      <div class="roster" id="roster"><div class="empty">sin delegaciones</div></div>
      <div class="panel-title" style="margin-top:18px">ALERTAS</div>
      <div class="alerts" id="alerts"><div class="empty">sin alertas</div></div>
      <div class="panel-title" style="margin-top:18px">NOTAS</div>
      <div class="notas" id="notas"><div class="empty">sin notas</div></div>
    </aside>

    <!-- Barra NOW PLAYING: estado real del reproductor de música -->
    <section class="nowplaying panel" id="nowplaying" data-sonando="0">
      <i class="bracket"></i>
      <div class="np-grid">
        <!-- Estado + título/artista + fuente -->
        <div class="np-meta">
          <span class="np-state" id="np-state">■</span>
          <div class="np-titles">
            <div class="np-title" id="np-title">—</div>
            <div class="np-line">
              <span class="np-artist" id="np-artist"></span>
              <span class="np-src" id="np-src" hidden></span>
            </div>
          </div>
        </div>

        <!-- Progreso -->
        <div class="np-progress">
          <span class="np-time" id="np-cur">0:00</span>
          <div class="bar np-bar" id="np-bar"><i id="np-fill"></i></div>
          <span class="np-time" id="np-dur">0:00</span>
        </div>

        <!-- Controles + volumen -->
        <div class="np-controls">
          <button type="button" id="np-prev" title="Anterior">⏮</button>
          <button type="button" id="np-play" class="np-play" title="Play/Pausa">▶</button>
          <button type="button" id="np-next" title="Siguiente">⏭</button>
          <span class="np-vol-ico">🔊</span>
          <input type="range" id="np-vol" class="np-vol" min="0" max="100" value="70" />
        </div>

        <!-- Visualizador (pulso vivo ligado al estado real) -->
        <canvas class="np-vis" id="np-vis"></canvas>

        <!-- Cola compacta -->
        <div class="np-queue" id="np-queue"><span class="np-q-label">EN COLA</span><span id="np-q-list" class="np-q-list">—</span></div>
      </div>
    </section>

    <!-- Abajo: consola en streaming + entrada -->
    <footer class="console panel">
      <i class="bracket"></i>
      <div class="panel-title">CONSOLA</div>
      <div class="log" id="log"></div>
      <form class="input" id="form" autocomplete="off">
        <span class="prompt">›</span>
        <input id="entrada" type="text" placeholder="Habla con CRISTOPHER…" />
        <button type="submit">enviar</button>
      </form>
    </footer>
  </div>

  <!-- Confirmación de acciones irreversibles (p. ej. enviar correo) -->
  <div class="confirm-overlay" id="confirm-overlay" hidden>
    <div class="confirm-card panel">
      <i class="bracket"></i>
      <div class="panel-title">CONFIRMAR ACCIÓN</div>
      <pre class="confirm-body" id="confirm-body"></pre>
      <div class="confirm-actions">
        <button type="button" class="btn-cancel" id="confirm-cancel">Cancelar</button>
        <button type="button" class="btn-ok" id="confirm-ok">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
